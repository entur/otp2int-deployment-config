name: Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
      tag:
        description: Repo tag to deploy (e.g. main-v19-ccde0368-v2.10.0-entur-32). Leave empty to deploy HEAD.
        required: false
        type: string

jobs:
  terraform-lint:
    if: ${{ !inputs.tag }}
    uses: entur/gha-terraform/.github/workflows/lint.yml@v2

  tf-plan-dev:
      if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
      needs: tag-repo
      name: Terraform Plan DEV
      uses: entur/gha-terraform/.github/workflows/plan.yml@v2
      with:
        environment: dev
  tf-approval-dev:
      if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.tf-plan-dev.outputs.has_changes == 'true' }}
      needs: [ tf-plan-dev ]
      runs-on: ubuntu-latest
      timeout-minutes: 10
      environment: Approve
      steps:
        - name: Manual approval
          shell: bash
          run: echo "Approve DEV tf plan"

  tf-apply-dev:
      if: ${{ !cancelled() && !contains(needs.*.result, 'failure') && needs.tf-plan-dev.outputs.has_changes == 'true' }}
      needs: [ tf-plan-dev, tf-approval-dev ]
      name: Terraform Apply DEV
      uses: entur/gha-terraform/.github/workflows/apply.yml@v2
      with:
        environment: dev
        has_changes: ${{ needs.tf-plan-dev.outputs.has_changes }}

  helm-lint:
    if: ${{ !inputs.tag }}
    uses: entur/gha-helm/.github/workflows/lint.yml@v1
    with:
      environment: ${{ inputs.environment || 'dev' }}
      chart: helm/otp2int
      values: values-kub-ent-jp-dev.yaml

  tag-repo:
    if: ${{ inputs.tag == '' || inputs.tag == null }}
    needs: [ helm-lint, terraform-lint ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Tag repo
        run: |
          IMAGE_TAG=$(grep 'identifier' helm/otp2int/values.yaml | awk -F: '{print $NF}' | tr -d ' ')
          REPO_TAG="${{ github.ref_name }}-v${{ github.run_number }}-${GITHUB_SHA:0:8}-${IMAGE_TAG}"
          gh api repos/${{ github.repository }}/git/refs \
            --method POST \
            -f ref="refs/tags/${REPO_TAG}" \
            -f sha="${{ github.sha }}" \
            || echo "::warning::Tag '${REPO_TAG}' already exists, skipping"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-dev:
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}
    needs: tf-apply-dev
    uses: entur/gha-helm/.github/workflows/deploy.yml@v1
    with:
      environment: dev
      gcp_cluster_location: europe-west4
      gcp_cluster_name: kub-ent-jp-dev-001
      image: na
      git_ref: ${{ inputs.tag }}
      values: values-kub-ent-jp-dev.yaml
      chart: helm/otp2int
      namespace: otp2int
      release_name: otp2int
    secrets: inherit
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    {{- include "common.labels" . | indent 4 }}
    traffic-type: api
  annotations:
    {{- include "common.annotations" . | indent 4 }}
  name: otp2int-journey-planner
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: traefik
  rules:
  - host: otp2int{{ .Values.ingress.otpApi.domainName }}
    http:
      paths:
        - pathType: ImplementationSpecific
          backend:
            service:
              name: {{ template "app.name" . }}
              port:
                number: {{ .Values.service.externalPort }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    {{- include "common.labels" . | indent 4 }}
    traffic-type: public
  name: otp2int-debug
  namespace: {{ .Release.Namespace }}
spec:
  ingressClassName: traefik
  rules:
    - host: otp2int-debug{{ .Values.ingress.otpDebug.domainName }}
      http:
        paths:
          - pathType: ImplementationSpecific
            backend:
              service:
                name: {{ template "app.name" . }}
                port:
                  number: {{ .Values.service.externalPort }}